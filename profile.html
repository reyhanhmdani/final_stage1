<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReyApp - Home</title>
    <!-- CDN Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Font Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-teal-950 via-slate-900 to-emerald-950 min-h-screen text-white relative overflow-x-hidden antialiased">
    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-emerald-500/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-teal-600/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-12 min-h-screen relative z-10 px-4 gap-6">
      <aside
        class="col-span-1 md:col-span-3 border-r border-white/5 md:p-6 p-4 flex flex-col justify-between md:h-screen sticky top-0 bg-slate-950/20 md:bg-transparent backdrop-blur-md md:backdrop-blur-none rounded-2xl md:rounded-none my-4 md:my-0"
      >
        <div class="space-y-8">
          <!-- Logo -->
          <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="9" stroke-width="2" stroke-dasharray="4 4"></circle>
              <circle cx="12" cy="12" r="3" fill="currentColor"></circle>
            </svg>
            <h1 class="text-2xl font-bold tracking-wider">rey<span class="text-emerald-400">app</span></h1>
          </div>

          <!-- Navigation -->
          <nav class="space-y-2">
            <a href="home.html" class="flex items-center gap-4 px-4 py-3 text-emerald-100/60 hover:bg-white/5 hover:text-white rounded-xl transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                ></path>
              </svg>
              <span>Home</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-emerald-100/60 hover:bg-white/5 hover:text-white rounded-xl transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
              </svg>
              <span>Search</span>
            </a>
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-emerald-100/60 hover:bg-white/5 hover:text-white rounded-xl transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
                ></path>
              </svg>
              <span>Follows</span>
            </a>
            <a href="profile.html" class="flex items-center gap-4 px-4 py-3 bg-white/10 text-emerald-400 font-semibold rounded-xl border border-white/5">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                ></path>
              </svg>
              <span>Profile</span>
            </a>
          </nav>

          <button
            onclick="document.getElementById('postInput').focus()"
            class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            <span>Create Post</span>
          </button>
        </div>

        <!-- Logout -->
        <a href="index.html" class="flex items-center gap-4 px-4 py-3 text-rose-400 hover:bg-rose-500/10 rounded-xl transition mt-8">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
          <span>Keluar</span>
        </a>
      </aside>
      <div class="col-span-1 md:col-span-6 md:p-6 p-2 space-y-6 min-h-screen border-r border-white/5">
        <div class="border-b border-white/5 pb-4 flex justify-between items-center">
          <h2 class="text-xl font-bold tracking-wide">Raihan Hamdani</h2>
          <span class="text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">Online</span>
        </div>

        <!-- Profil -->
        <div class="bg-white/5 backdrop-blur-md border border-white/10 p-5 rounded-2xl space-y-4 shadow-xl relative overflow-hidden">
          <div class="rounded-lg absolute top-0 left-0 w-full h-20 bg-gradient-to-r from-emerald-500/40 to-teal-500/30"></div>
          <div
            class="w-16 h-16 rounded-full bg-emerald-500 border border-emerald-400 flex items-center justify-center text-2xl font-bold shadow-lg relative z-10"
          >
            R
          </div>
          <div class="relative z-10">
            <div class="flex justify-between items-center">
              <h3 class="font-bold text-base">Raihan Hamdani</h3>
              <a
                href="#"
                class="text-xs text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 hover:bg-emerald-500 hover:text-white transition duration-300"
                >Edit Profile</a
              >
            </div>
            <p class="text-xs text-emerald-200/60 mb-5">@reyyy</p>
            <p class="text-xs text-white">Fullstack Developer</p>
          </div>
          <div class="grid grid-cols-2 pt-2 border-t border-white/5 text-xs">
            <div>
              <p class="font-bold text-emerald-400">291</p>
              <p class="text-[10px] text-emerald-200/40">Mengikuti</p>
            </div>
            <div>
              <p class="font-bold text-emerald-400">542</p>
              <p class="text-[10px] text-emerald-200/40">Pengikut</p>
            </div>
          </div>
        </div>

        <!-- Feed Container -->
        <div id="feedContainer" class="space-y-4"></div>
      </div>
      <aside class="col-span-1 md:col-span-3 md:p-6 p-4 space-y-6 md:h-screen md:sticky md:top-0">
        <!-- Rekomendasi Kawan -->
        <div class="bg-white/5 backdrop-blur-md border border-white/10 p-5 rounded-2xl space-y-4 shadow-xl">
          <h3 class="font-bold text-sm text-emerald-400 tracking-wide">Rekomendasi Teman</h3>
          <div id="rekomendasiList" class="space-y-4"></div>
        </div>

        <!-- Footer -->
        <div class="text-center text-[10px] text-emerald-200/20 space-y-1">
          <p>Developed by Rey &copy; 2026</p>
          <p>Di buat memakai Tailwind dan JS</p>
        </div>
      </aside>
    </div>

    <script>
      const userProfile = [
        {
          id: 1,
          avatar: "R",
          name: "Raihan hamdani",
          username: "@reyyy",
          like: 45,
          feed: "loreNecessitatibus error qui distinctio. Eum nemo velit temporibus. Suscipit deleniti ipsa blanditiis reiciendis aperiam dolorem eum. Sed aliquid sunt repellat ab aut fugiat.",
          created_at: "4 jam yang lalu",
          image: "https://images.unsplash.com/photo-1498050108023-c5249f4df085?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80"
        },
        {
          id: 2,
          avatar: "R",
          name: "Raihan hamdani",
          username: "@reyyy",
          like: 145,
          feed: "loreNecessitatibus error qui distinctio. Eum nemo velit temporibus. Suscipit deleniti ipsa blanditiis reiciendis aperiam dolorem eum. Sed aliquid sunt repellat ab aut fugiat.",
          created_at: "20 jam yang lalu",
          image: ""
        },
      ];

      const userLain = [
        {
          id: 1,
          avatar: "A",
          name: "Aemeath",
          username: "@Aemeath",
        },
        {
          id: 2,
          avatar: "D",
          name: "Denia",
          username: "@Denia",
        },
        {
          id: 3,
          avatar: "J",
          name: "Jinhsi",
          username: "@Jinhsi",
        },
        {
          id: 4,
          avatar: "g",
          name: "GeshuLin",
          username: "@GeshuLin",
        },
      ];

      const profileContent = document.getElementById("feedContainer");
      const colors = ["bg-red-500", "bg-purple-500", "bg-amber-500", "bg-teal-500"];

      let profileContentHtml = "";

      for (let i = 0; i < userProfile.length; i++) {
        const data = userProfile[i];
        const avatarColor = colors[i];

        profileContentHtml += /*html*/ `
        <div class="bg-white/5 backdrop-blur-md border border-white/10 p-5 rounded-2xl space-y-3 shadow-md">
              <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full ${avatarColor} flex items-center justify-center font-bold text-xs">${data.avatar}</div>
                <div>
                  <h4 id="nameUser" class="text-xs font-semibold">${data.name}</h4>
                  <p class="text-[10px] text-emerald-200/40">${data.username} &bull; ${data.created_at}</p>
                </div>
              </div>
              <p class="text-xs text-emerald-100/90 leading-relaxed whitespace-pre-line">
                ${data.feed}
              </p>
              ${data.image ? `<img src="${data.image}" alt="Post image" class="rounded-xl w-full object-cover max-h-80 border border-white/5 mt-2">` : ""}
              <div class="flex items-center gap-6 pt-2 border-t border-white/5 text-xs text-emerald-200/40">
                <button class="flex items-center gap-2 hover:text-rose-400 transition">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"
                    ></path>
                  </svg>
                  <span id="like" class="text-[11px]">${data.like}</span>
                </button>
                <button class="flex items-center gap-2 hover:text-emerald-400 transition">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
                    ></path>
                  </svg>
                  <span class="text-[11px]">Komentar</span>
                </button>
              </div>
            </div>
        `;
      }
      profileContent.innerHTML = profileContentHtml;

      const rekomendasiList = document.getElementById("rekomendasiList");

      let rekomendasiListHtml = "";

      for (let i = 0; i < userLain.length; i++) {
        const user = userLain[i];
        const avatarColor = colors[i];

        rekomendasiListHtml += /*html*/ `
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <div class="w-8 h-8 rounded-full ${avatarColor} flex items-center justify-center font-bold text-xs">${user.avatar}</div>
              <div>
                <h4 class="text-xs font-semibold">${user.name}</h4>
                <p class="text-[10px] text-emerald-200/40">${user.username}</p>
              </div>
            </div>
            <button class="text-[10px] bg-white text-zinc-950 font-bold px-3 py-1.5 rounded-full hover:bg-emerald-400 hover:text-white transition">Follow</button>
          </div>
        `;

        rekomendasiList.innerHTML = rekomendasiListHtml;
      }
    </script>
  </body>
</html>
