<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rey APP</title>

    <link rel="stylesheet" href="src/output.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      body {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-teal-950 via-slate-900 to-emerald-950 min-h-screen flex items-center justify-center p4 relative overflow-hidden">
    <div class="absolute top-0 left-1/4 w-96 h-96 bg-emerald-500/20 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-teal-600/20 rounded-full blur-[100px] pointer-events-none"></div>

    <div
      class="bg-white/10 backdrop-blur-lg border border-white/20 p-8 rounded-2xl shadow-2xl w-full max-w-sm relative z-10 transition-all duration-300 hover:shadow-emerald-900/50"
    >
      <!-- Bagian Form nya  -->
      <div>
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-white tracking-wide">Selamat Datang</h2>
          <p class="text-sm text-emerald-200/70 mt-1">Gass Daftar</p>
        </div>

        <form class="space-y-5">
          <div>
            <label class="text-sm font-medium text-emerald-100 mb-1.5">Nama Lengkap</label>
            <input
              type="email"
              class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/30 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:bg-white/10 transition duration-300"
              placeholder="Masukkan Nama Lengkap ..."
              required
            />
          </div>
          <div>
            <label class="text-sm font-medium text-emerald-100 mb-1.5">Email</label>
            <input
              type="email"
              class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/30 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:bg-white/10 transition duration-300"
              placeholder="contoh@gmail.com"
              required
            />
          </div>
          <div>
            <label class="text-sm font-medium text-emerald-100 mb-1.5">Password</label>
            <input
              type="password"
              class="w-full px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl text-white placeholder-emerald-200/30 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:bg-white/10 transition duration-300"
              placeholder="••••••••"
              required
            />
          </div>
          <button
            type="submit"
            class="w-full bg-teal-500 text-white font-semibold py-3 rounded-xl hover:bg-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:shadow-[0_0_25px_rgba(16,185,129,0.5)] transition-all duration-300 mt-2"
          >
            Daftar Sekarang!
          </button>
        </form>

        <p class="text-sm text-emerald-200/60 text-center mt-5">
          Sudah punya akun? <span class="text-white"><a href="login.html">Login</a></span> Buruan..
        </p>
      </div>
    </div>
  </body>
</html>
